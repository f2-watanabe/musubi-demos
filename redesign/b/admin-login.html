<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン｜Musubi管理アプリ — Pattern B</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="ic-mail" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></symbol>
    <symbol id="ic-lock" viewBox="0 0 24 24"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></symbol>
    <symbol id="ic-check" viewBox="0 0 24 24"><path d="M5 13l4.5 4.5L19 8"/></symbol>
  </defs>
</svg>

<div class="loginpage">
  <section class="loginbrand">
    <div class="inner">
      <div class="mk">結</div>
      <div class="eyebrow">MUSUBI ADMIN CONSOLE</div>
      <h2>店舗の集客を、<br>ひとつの管理画面で。</h2>
      <p class="lead">
        営業リスト・サイト制作・口コミ返信AI・請求・レポートを一元管理。Google高評価×Web未保有の店舗向け運営プラットフォーム。
      </p>
      <div class="feats">
        <div class="feat"><span class="tick"><svg class="icon"><use href="#ic-check"/></svg></span>口コミ返信AIで運用を自動化</div>
        <div class="feat"><span class="tick"><svg class="icon"><use href="#ic-check"/></svg></span>顧客サイトをテンプレで量産</div>
        <div class="feat"><span class="tick"><svg class="icon"><use href="#ic-check"/></svg></span>MRR・継続率をリアルタイム把握</div>
      </div>
    </div>
  </section>

  <section class="loginform">
    <div class="box">
      <div class="logo">
        <span class="mk">結</span>
        <b>Musubi</b>
      </div>
      <div class="sub">管理アプリ ・ 運営スタッフ専用</div>

      <form onsubmit="return false;">
        <div class="field">
          <label for="email">メールアドレス</label>
          <div class="inwrap">
            <span class="ic"><svg class="icon"><use href="#ic-mail"/></svg></span>
            <input id="email" name="email" type="email" required autocomplete="email" placeholder="you@example.com">
          </div>
        </div>
        <div class="field">
          <label for="password">パスワード</label>
          <div class="inwrap">
            <span class="ic"><svg class="icon"><use href="#ic-lock"/></svg></span>
            <input id="password" name="password" type="password" required autocomplete="current-password" placeholder="••••••••">
          </div>
        </div>
        <button class="submitbtn" type="submit">ログイン</button>
      </form>

      <div class="loginfoot">© Musubi ・ セキュアな接続で保護されています</div>
    </div>
  </section>
</div>

</body>
</html>
