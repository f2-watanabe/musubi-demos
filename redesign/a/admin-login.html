<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>管理ログイン ー Musubi Redesign A</title>
<meta name="description" content="Musubi 管理コンソール ログイン画面 パターンA モック" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
  rel="stylesheet"
/>
<link rel="stylesheet" href="style.css" />
<style>
  body {
    background: var(--paper);
  }
  .back {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 20;
    font-size: 12.5px;
    color: var(--muted);
    background: var(--paper);
    padding: 6px 10px;
  }
  .back:hover {
    color: var(--ink);
  }
  .shell {
    display: grid;
    grid-template-columns: minmax(0, 1.05fr) minmax(0, 1fr);
    min-height: 100dvh;
  }
  .brandside {
    background: var(--panel-dark);
    color: var(--paper);
    padding: 72px 64px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .mark-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .mark {
    width: 44px;
    height: 44px;
    border: 1px solid rgba(250, 249, 245, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-size: 20px;
  }
  .mark-word {
    font-family: var(--font-display);
    font-size: 15px;
    letter-spacing: 0.06em;
  }
  .brand-mid {
    max-width: 560px;
  }
  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.16em;
    color: rgba(250, 249, 245, 0.55);
    margin-bottom: 30px;
  }
  .brand-mid h1 {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: clamp(2rem, 3.4vw, 2.9rem);
    line-height: 1.45;
    margin: 0 0 26px;
  }
  .brand-mid p {
    font-size: 14.5px;
    line-height: 1.9;
    color: rgba(250, 249, 245, 0.72);
    margin: 0;
  }
  .featlist {
    margin-top: 40px;
    border-top: 1px solid var(--line-on-dark);
  }
  .featlist .fi {
    display: flex;
    align-items: baseline;
    gap: 14px;
    padding: 16px 0;
    border-bottom: 1px solid var(--line-on-dark);
    font-size: 13.5px;
  }
  .featlist .fi .n {
    font-family: var(--font-display);
    color: rgba(250, 249, 245, 0.45);
    font-size: 13px;
  }
  .brand-foot {
    font-size: 12px;
    color: rgba(250, 249, 245, 0.4);
  }

  .formside {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 64px 48px;
  }
  .formwrap {
    width: 100%;
    max-width: 380px;
  }
  .fw-word {
    font-family: var(--font-display);
    font-size: 22px;
    margin-bottom: 4px;
  }
  .fw-sub {
    font-size: 12.5px;
    color: var(--muted);
    margin-bottom: 48px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--line);
  }
  form {
    margin-top: 4px;
  }
  .submit {
    width: 100%;
    margin-top: 6px;
  }
  .fw-foot {
    margin-top: 34px;
    font-size: 12px;
    color: var(--muted);
  }

  @media (max-width: 900px) {
    .shell {
      grid-template-columns: 1fr;
    }
    .brandside {
      padding: 56px 32px 48px;
    }
    .featlist {
      display: none;
    }
  }
  @media (max-width: 480px) {
    .brandside {
      padding: 44px 22px 36px;
    }
    .formside {
      padding: 44px 22px;
    }
    .back {
      display: none;
    }
  }
</style>
</head>
<body>

<a class="back" href="index.html">← 概要へ</a>

<main class="shell">
  <section class="brandside">
    <div class="mark-row">
      <span class="mark">結</span>
      <span class="mark-word">Musubi</span>
    </div>

    <div class="brand-mid">
      <div class="eyebrow">MUSUBI ADMIN CONSOLE</div>
      <h1>店舗の集客を、<br />ひとつの管理画面で。</h1>
      <p>
        営業リスト・サイト制作・口コミ返信AI・請求・レポートを一元管理。Google高評価×Web未保有の店舗向け運営プラットフォーム。
      </p>

      <div class="featlist">
        <div class="fi"><span class="n">01</span>口コミ返信AIで運用を自動化</div>
        <div class="fi"><span class="n">02</span>顧客サイトをテンプレで量産</div>
        <div class="fi"><span class="n">03</span>MRR・継続率をリアルタイム把握</div>
      </div>
    </div>

    <div class="brand-foot">© Musubi</div>
  </section>

  <section class="formside">
    <div class="formwrap">
      <div class="fw-word">Musubi</div>
      <div class="fw-sub">管理アプリ ・ 運営スタッフ専用</div>

      <form>
        <div class="field">
          <label for="email">メールアドレス</label>
          <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="field">
          <label for="password">パスワード</label>
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary submit">ログイン</button>
      </form>

      <div class="fw-foot">© Musubi ・ セキュアな接続で保護されています</div>
    </div>
  </section>
</main>
</body>
</html>
