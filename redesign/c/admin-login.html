<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン | Musubi 管理アプリ（パターンC）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .page{ min-height: 100dvh; display: flex; }
  .shell{ display: grid; grid-template-columns: 1.05fr 1fr; width: 100%; }

  /* left: brand panel */
  .brand{
    position: relative; overflow: hidden;
    background: var(--green-deep); color: var(--paper);
    padding: 64px 56px; display: flex; flex-direction: column; justify-content: center;
  }
  .brand::before{
    content: ""; position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(560px 560px at 8% 8%, rgba(193,89,46,.22), transparent 62%),
      radial-gradient(700px 700px at 100% 100%, rgba(255,255,255,.05), transparent 60%);
  }
  .brand > *{ position: relative; z-index: 1; }
  .brand .mk{ background: var(--amber); color: #fff; width: 46px; height: 46px; font-size: 19px; margin-bottom: 28px; }
  .eyebrow{
    font-size: 12px; font-weight: 700; letter-spacing: .28em; color: var(--amber-soft);
    margin-bottom: 22px; display: flex; align-items: center; gap: 12px;
  }
  .eyebrow::before{ content: ""; width: 30px; height: 1px; background: var(--amber); }
  .brand h1{
    font-family: var(--font-display); font-weight: 700;
    font-size: clamp(28px, 3.4vw, 40px); line-height: 1.5; margin: 0 0 20px; color: #fff;
  }
  .brand .lead{ font-size: 14.5px; line-height: 1.9; color: rgba(247,242,230,.82); max-width: 40ch; margin: 0 0 30px; }
  .feats{ display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px; }
  .feat{ display: flex; align-items: center; gap: 10px; font-size: 13.5px; color: rgba(247,242,230,.9); }
  .feat .tick{
    flex: none; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    background: rgba(193,89,46,.25); color: var(--amber-soft); font-size: 11px;
  }
  .cord{ opacity: .9; max-width: 320px; }
  .cord path{ stroke: var(--amber); opacity: .5; }

  /* right: form panel */
  .form-side{
    background: var(--paper); display: flex; align-items: center; justify-content: center;
    padding: 56px 48px;
  }
  .form-inner{ width: 100%; max-width: 360px; }
  .logo-mark{ display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .logo-mark b{ font-family: var(--font-display); font-size: 21px; font-weight: 700; color: var(--green); }
  .sub{ font-size: 12.5px; color: var(--ink-soft); margin-bottom: 34px; }
  .foot{ margin-top: 26px; font-size: 11.5px; color: var(--ink-faint); text-align: center; }

  @media (max-width: 860px){
    .shell{ grid-template-columns: 1fr; }
    .brand{ padding: 44px 28px 40px; }
    .brand h1{ font-size: 26px; }
    .cord{ display: none; }
    .form-side{ padding: 40px 24px 56px; }
  }
  @media (max-width: 480px){
    .brand{ padding: 36px 22px 32px; }
    .eyebrow{ letter-spacing: .2em; font-size: 11px; }
    .brand h1{ font-size: 23px; }
    .brand .lead{ font-size: 13.5px; }
    .form-side{ padding: 30px 18px 48px; }
  }
</style>
</head>
<body>
<main class="page">
  <div class="shell">
    <section class="brand">
      <span class="mk">結</span>
      <div class="eyebrow">MUSUBI ADMIN CONSOLE</div>
      <h1>店舗の集客を、<br>ひとつの管理画面で。</h1>
      <p class="lead">
        営業リスト・サイト制作・口コミ返信AI・請求・レポートを一元管理。
        Google高評価×Web未保有の店舗向け運営プラットフォーム。
      </p>
      <div class="feats">
        <div class="feat"><span class="tick">✓</span>口コミ返信AIで運用を自動化</div>
        <div class="feat"><span class="tick">✓</span>顧客サイトをテンプレで量産</div>
        <div class="feat"><span class="tick">✓</span>MRR・継続率をリアルタイム把握</div>
      </div>
      <svg class="cord" viewBox="0 0 320 34" aria-hidden="true">
        <path d="M4 17c20-20 40 20 60 0s40-20 60 0 40 20 60 0 40-20 60 0 40 20 60 0"/>
      </svg>
    </section>

    <section class="form-side">
      <div class="form-inner">
        <div class="logo-mark">
          <span class="mk">結</span>
          <b>Musubi</b>
        </div>
        <div class="sub">管理アプリ・運営スタッフ専用</div>

        <form>
          <div class="field">
            <label for="email">メールアドレス</label>
            <div class="inwrap">
              <span class="ic" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
              </span>
              <input class="inp" id="email" type="email" placeholder="you@example.com" autocomplete="email">
            </div>
          </div>
          <div class="field">
            <label for="password">パスワード</label>
            <div class="inwrap">
              <span class="ic" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
              </span>
              <input class="inp" id="password" type="password" placeholder="••••••••" autocomplete="current-password">
            </div>
          </div>
          <button type="submit" class="btn btn-pri btn-block">ログイン</button>
        </form>

        <div class="foot">© Musubi・セキュアな接続で保護されています</div>
      </div>
    </section>
  </div>
</main>
</body>
</html>
